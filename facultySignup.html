<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Faculty Signup - FPMS</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/login+sign.css">
    <!-- Load Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<!-- Background Slideshow -->
<div class="slideshow-bg" id="slideshowBg">
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=1920&h=1080&fit=crop');"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1544717305-38b9144f7a1b?w=1920&h=1080&fit=crop');"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=1920&h=1080&fit=crop');"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1562774053-701939374585?w=1920&h=1080&fit=crop');"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1920&h=1080&fit=crop');"></div>
</div>

<div class="auth-box">
    <div class="auth-header">
        <div class="icon-circle">
            <i class="fas fa-chalkboard-teacher"></i>
        </div>
        <h2>Faculty Sign Up</h2>
        <p>Create your faculty account</p>
    </div>

    <div class="auth-body">
        <!-- Google Sign Up Button -->
        <button type="button" class="btn-google" id="googleSignUpBtn">
            <i class="fab fa-google"></i> Sign up with Google
        </button>

        <div class="divider">
            <span>OR</span>
        </div>

        <!-- Email Sign Up Form -->
        <form id="signupForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="fullName" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required minlength="6">
                <i class="fas fa-eye toggle-password" data-target="password"></i>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
                <i class="fas fa-eye toggle-password" data-target="confirmPassword"></i>
            </div>

            <div class="terms-checkbox">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">I agree to the <a href="#" id="termsLink">Terms of Service</a> and <a href="#" id="privacyLink">Privacy Policy</a></label>
            </div>

            <button type="button" class="btn" id="signupBtn">
                <span class="btn-text">Create Account</span>
                <span class="btn-loading" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i> Creating...
                </span>
            </button>
        </form>

        <div id="message" class="message-container"></div>

        <p>
            Already have account?
            <a href="facultyLogin.html">Login</a>
        </p>
    </div>
</div>

<!-- Verification Modal -->
<div id="verificationModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <i class="fas fa-envelope-open-text"></i>
            <h3>Verify Your Email</h3>
        </div>
        <div class="modal-body">
            <p>We've sent a verification email to <strong id="verificationEmail"></strong></p>
            <div class="verification-steps">
                <div class="step">
                    <i class="fas fa-envelope"></i>
                    <span>Check your inbox & spam folder</span>
                </div>
                <div class="step">
                    <i class="fas fa-link"></i>
                    <span>Click the verification link</span>
                </div>
                <div class="step">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login to your account after verification</span>
                </div>
            </div>
            <div class="verification-timer">
                <i class="fas fa-clock"></i>
                <span>Auto-checking for verification in <span id="timerCountdown">60</span> seconds</span>
            </div>
            <button class="btn-resend" id="resendVerificationBtn">
                <i class="fas fa-redo-alt"></i> Resend Verification Email
            </button>
            <button class="btn-check" id="checkVerificationBtn">
                <i class="fas fa-check-circle"></i> I've Verified, Check Now
            </button>
            <button class="btn-cancel" id="closeModalBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
// ============================================
// BACKGROUND SLIDESHOW
// ============================================
const slides = document.querySelectorAll('.slide');
let currentSlide = 0;
let slideInterval;

function nextSlide() {
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
}

function startSlideshow() {
    slideInterval = setInterval(nextSlide, 5000);
}

function stopSlideshow() {
    if (slideInterval) clearInterval(slideInterval);
}

// Start slideshow
startSlideshow();

// Pause on hover, resume on mouse leave
const slideshowBg = document.getElementById('slideshowBg');
if (slideshowBg) {
    slideshowBg.addEventListener('mouseenter', stopSlideshow);
    slideshowBg.addEventListener('mouseleave', startSlideshow);
    
    // Click to change slide manually (cursor pointer effect)
    slideshowBg.addEventListener('click', () => {
        nextSlide();
    });
}

// =================== FIREBASE CONFIGURATION ===================
const firebaseConfig = {
    apiKey: "AIzaSyCLUvxU19ePhSex0g0-VEVZJlwVP4vkRiU",
    authDomain: "faculty-profile-manageme-b912b.firebaseapp.com",
    projectId: "faculty-profile-manageme-b912b",
    storageBucket: "faculty-profile-manageme-b912b.firebasestorage.app",
    messagingSenderId: "492340972765",
    appId: "1:492340972765:web:30ef69e2ce0e6e59c9df34",
    measurementId: "G-42SHN6353G"
};

// Initialize Firebase
let auth, db;
try {
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    auth = firebase.auth();
    db = firebase.firestore();
    console.log("✅ Firebase initialized successfully!");
} catch (error) {
    console.error("Firebase initialization error:", error);
}

// DOM Elements
const signupBtn = document.getElementById('signupBtn');
const signupForm = document.getElementById('signupForm');
const messageDiv = document.getElementById('message');
const verificationModal = document.getElementById('verificationModal');
const googleSignUpBtn = document.getElementById('googleSignUpBtn');
let currentUserEmail = '';
let verificationCheckInterval = null;

// Show message function
function showMessage(text, type = "info") {
    if (!messageDiv) return;
    messageDiv.textContent = text;
    messageDiv.className = `message-container ${type}`;
    messageDiv.style.display = 'block';
    
    if (type === 'success' || type === 'info') {
        setTimeout(() => {
            if (messageDiv.textContent === text) {
                messageDiv.style.display = 'none';
            }
        }, 5000);
    }
}

// Toggle password visibility
document.querySelectorAll('.toggle-password').forEach(toggle => {
    toggle.addEventListener('click', function() {
        const targetId = this.getAttribute('data-target');
        const input = document.getElementById(targetId);
        if (input.type === 'password') {
            input.type = 'text';
            this.classList.remove('fa-eye');
            this.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            this.classList.remove('fa-eye-slash');
            this.classList.add('fa-eye');
        }
    });
});

// Show modal with animation
function showVerificationModal(email) {
    currentUserEmail = email;
    const emailSpan = document.getElementById('verificationEmail');
    if (emailSpan) emailSpan.textContent = email;
    if (verificationModal) verificationModal.style.display = 'flex';
    
    let countdown = 60;
    const timerElement = document.getElementById('timerCountdown');
    
    if (verificationCheckInterval) clearInterval(verificationCheckInterval);
    
    verificationCheckInterval = setInterval(async () => {
        countdown--;
        if (timerElement) timerElement.textContent = countdown;
        
        if (countdown <= 0) {
            clearInterval(verificationCheckInterval);
            await checkEmailVerification();
        }
    }, 1000);
}

// Check if email is verified
async function checkEmailVerification() {
    if (!auth.currentUser) return false;
    
    try {
        await auth.currentUser.reload();
        const user = auth.currentUser;
        
        if (user.emailVerified) {
            clearInterval(verificationCheckInterval);
            
            showMessage("✅ Email verified successfully! Redirecting to login...", "success");
            
            if (db && user.uid) {
                await db.collection('faculty').doc(user.uid).update({
                    emailVerified: true,
                    emailVerifiedAt: firebase.firestore.FieldValue.serverTimestamp()
                }).catch(err => console.warn("Firestore update:", err));
            }
            
            setTimeout(() => {
                if (verificationModal) verificationModal.style.display = 'none';
                window.location.href = "facultyLogin.html?verified=true";
            }, 2000);
            
            return true;
        }
        
        return false;
    } catch (error) {
        console.error("Error checking verification:", error);
        return false;
    }
}

// Resend verification email
async function resendVerificationEmail() {
    if (!auth.currentUser) {
        showMessage("Please sign up again to resend verification email.", "error");
        return;
    }
    
    try {
        await auth.currentUser.sendEmailVerification();
        showMessage("✅ Verification email resent! Please check your inbox.", "success");
        
        let countdown = 60;
        const timerElement = document.getElementById('timerCountdown');
        if (timerElement) timerElement.textContent = countdown;
        
        clearInterval(verificationCheckInterval);
        verificationCheckInterval = setInterval(async () => {
            countdown--;
            if (timerElement) timerElement.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(verificationCheckInterval);
                await checkEmailVerification();
            }
        }, 1000);
        
    } catch (error) {
        console.error("Resend error:", error);
        showMessage("Failed to resend verification email. Please try again later.", "error");
    }
}

// Save user data to Firestore
async function saveUserToFirestore(user, fullName, signupMethod = 'email') {
    if (!db) return false;
    
    try {
        const userData = {
            fullName: fullName || user.displayName || '',
            email: user.email,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            role: 'faculty',
            uid: user.uid,
            profileComplete: false,
            emailVerified: user.emailVerified || false,
            signupMethod: signupMethod,
            lastLogin: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        if (signupMethod === 'google') {
            userData.photoURL = user.photoURL || '';
            userData.googleId = user.providerData[0]?.uid || '';
        }
        
        await db.collection('faculty').doc(user.uid).set(userData, { merge: true });
        console.log(`✅ User data saved to Firestore (${signupMethod})`);
        return true;
    } catch (error) {
        console.error("Error saving to Firestore:", error);
        return false;
    }
}

// Google Sign Up (with proper success message and redirect)
async function handleGoogleSignUp() {
    const googleProvider = new firebase.auth.GoogleAuthProvider();
    googleProvider.addScope('email');
    googleProvider.addScope('profile');
    
    // Disable button and show loading
    googleSignUpBtn.disabled = true;
    const originalText = googleSignUpBtn.innerHTML;
    googleSignUpBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting to Google...';
    
    try {
        const result = await auth.signInWithPopup(googleProvider);
        const user = result.user;
        
        console.log("✅ Google signup successful:", user.email);
        
        // Check if user already exists in Firestore
        const existingUser = await db.collection('faculty').doc(user.uid).get();
        
        if (existingUser.exists) {
            // User already exists, update last login
            await db.collection('faculty').doc(user.uid).update({
                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
            });
            showMessage("✅ Welcome back! Account exists. Redirecting to dashboard...", "success");
            setTimeout(() => {
                window.location.href = "facultyDashboard.html";
            }, 1500);
        } else {
            // New user - save to Firestore
            await saveUserToFirestore(user, user.displayName, 'google');
            // Show clear success message for new Google signup
            showMessage("✅ Google account created successfully! Redirecting to dashboard...", "success");
            setTimeout(() => {
                window.location.href = "facultyDashboard.html";
            }, 1500);
        }
        
    } catch (error) {
        console.error("Google signup error:", error);
        
        let errorMessage = "Google sign up failed. ";
        if (error.code === 'auth/popup-blocked') {
            errorMessage = "Popup was blocked. Please allow popups for this site.";
        } else if (error.code === 'auth/popup-closed-by-user') {
            errorMessage = "Sign up cancelled. Please try again.";
        } else if (error.code === 'auth/account-exists-with-different-credential') {
            errorMessage = "An account already exists with this email. Please sign in with email/password.";
        } else if (error.code === 'auth/network-request-failed') {
            errorMessage = "Network error. Please check your internet connection.";
        } else {
            errorMessage += error.message || "Please try again.";
        }
        
        showMessage(errorMessage, "error");
        
    } finally {
        googleSignUpBtn.disabled = false;
        googleSignUpBtn.innerHTML = originalText;
    }
}

// Email Signup function
async function handleSignup() {
    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const agreeTerms = document.getElementById('agreeTerms').checked;
    
    showMessage("", "info");
    
    if (!fullName || !email || !password || !confirmPassword) {
        showMessage("Please fill in all fields", "error");
        return;
    }
    
    if (password !== confirmPassword) {
        showMessage("Passwords do not match", "error");
        return;
    }
    
    if (password.length < 6) {
        showMessage("Password must be at least 6 characters", "error");
        return;
    }
    
    if (!agreeTerms) {
        showMessage("Please agree to the Terms of Service and Privacy Policy", "error");
        return;
    }
    
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        showMessage("Please enter a valid email address", "error");
        return;
    }
    
    signupBtn.disabled = true;
    const btnText = document.querySelector('.btn-text');
    const btnLoading = document.querySelector('.btn-loading');
    if (btnText) btnText.style.display = 'none';
    if (btnLoading) btnLoading.style.display = 'inline-block';
    
    try {
        showMessage("Creating your account...", "info");
        console.log("Starting signup process...");
        
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        console.log("✅ User created:", user.uid);
        
        await saveUserToFirestore(user, fullName, 'email');
        
        await user.sendEmailVerification();
        console.log("✅ Verification email sent to:", email);
        
        showVerificationModal(email);
        document.getElementById('signupForm').reset();
        showMessage("✅ Account created! Please verify your email to login.", "success");
        
    } catch (error) {
        console.error("❌ Signup error:", error);
        
        let errorMessage = "Error: ";
        switch(error.code) {
            case 'auth/email-already-in-use':
                errorMessage = "This email is already registered. Please login or use a different email.";
                break;
            case 'auth/invalid-email':
                errorMessage = "Invalid email address format.";
                break;
            case 'auth/weak-password':
                errorMessage = "Password is too weak. Please use a stronger password.";
                break;
            case 'auth/operation-not-allowed':
                errorMessage = "Email/password accounts are not enabled. Contact support.";
                break;
            case 'auth/network-request-failed':
                errorMessage = "Network error. Please check your internet connection.";
                break;
            default:
                errorMessage = error.message || "An error occurred. Please try again.";
        }
        
        showMessage(errorMessage, "error");
        
        if (error.code !== 'auth/email-already-in-use' && auth.currentUser) {
            try {
                await auth.currentUser.delete();
                console.log("Cleaned up partial account");
            } catch (deleteError) {
                console.warn("Could not delete partial account:", deleteError);
            }
        }
        
    } finally {
        signupBtn.disabled = false;
        if (btnText) btnText.style.display = 'inline-block';
        if (btnLoading) btnLoading.style.display = 'none';
    }
}

// Event Listeners
const checkVerificationBtn = document.getElementById('checkVerificationBtn');
if (checkVerificationBtn) {
    checkVerificationBtn.addEventListener('click', async () => {
        showMessage("Checking verification status...", "info");
        const isVerified = await checkEmailVerification();
        if (!isVerified) {
            showMessage("Email not verified yet. Please check your inbox and click the verification link.", "error");
        }
    });
}

const resendVerificationBtn = document.getElementById('resendVerificationBtn');
if (resendVerificationBtn) {
    resendVerificationBtn.addEventListener('click', async () => {
        await resendVerificationEmail();
    });
}

const closeModalBtn = document.getElementById('closeModalBtn');
if (closeModalBtn) {
    closeModalBtn.addEventListener('click', () => {
        if (verificationModal) verificationModal.style.display = 'none';
        if (verificationCheckInterval) clearInterval(verificationCheckInterval);
        showMessage("Please verify your email to complete registration.", "info");
    });
}

window.addEventListener('click', (event) => {
    if (event.target === verificationModal) {
        if (verificationModal) verificationModal.style.display = 'none';
        if (verificationCheckInterval) clearInterval(verificationCheckInterval);
    }
});

if (signupBtn) signupBtn.addEventListener('click', handleSignup);
if (googleSignUpBtn) googleSignUpBtn.addEventListener('click', handleGoogleSignUp);

if (signupForm) {
    signupForm.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSignup();
        }
    });
}

const termsLink = document.getElementById('termsLink');
if (termsLink) {
    termsLink.addEventListener('click', (e) => {
        e.preventDefault();
        alert("Terms of Service:\n\n1. You must be a faculty member.\n2. Provide accurate information.\n3. Keep your account secure.\n4. Respect others' privacy.\n5. Use this platform for academic purposes only.");
    });
}

const privacyLink = document.getElementById('privacyLink');
if (privacyLink) {
    privacyLink.addEventListener('click', (e) => {
        e.preventDefault();
        alert("Privacy Policy:\n\nYour data is stored securely and will not be shared with third parties without your consent.");
    });
}

window.onload = function() {
    console.log("Page loaded. Firebase status:", auth ? "Ready" : "Not ready");
    console.log("Google Sign-In is available!");
    
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('verified') === 'true') {
        showMessage("✅ Email verified! You can now login.", "success");
    }
    
    if (auth.currentUser && !auth.currentUser.emailVerified) {
        showVerificationModal(auth.currentUser.email);
    }
};
</script>
</body>
</html>
